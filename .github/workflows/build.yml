name: Build PPT 병합기

on:
  push:
    tags:
      - 'v*'          # v1.0, v1.1 등 태그 푸시 시 자동 빌드
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  # ── macOS 빌드 ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install PySide6 python-pptx lxml pyinstaller

      - name: LibreOffice 최신 버전 확인
        id: lo_version
        run: |
          LO_VER=$(curl -s https://download.documentfoundation.org/libreoffice/stable/ \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+/' | sort -V | tail -1 | tr -d '/')
          echo "version=$LO_VER" >> $GITHUB_OUTPUT
          echo "LibreOffice 버전: $LO_VER"

      - name: LibreOffice 캐시 복원
        id: lo_cache
        uses: actions/cache@v4
        with:
          path: /Applications/LibreOffice.app
          key: libreoffice-mac-${{ runner.arch }}-${{ steps.lo_version.outputs.version }}

      - name: LibreOffice 다운로드 및 설치
        if: steps.lo_cache.outputs.cache-hit != 'true'
        run: |
          LO_VER="${{ steps.lo_version.outputs.version }}"
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            URL_ARCH="aarch64"
          else
            URL_ARCH="x86_64"
          fi
          LO_FILE="LibreOffice_${LO_VER}_MacOS_${URL_ARCH}.dmg"
          LO_URL="https://download.documentfoundation.org/libreoffice/stable/${LO_VER}/mac/${URL_ARCH}/${LO_FILE}"
          echo "다운로드: $LO_URL"
          curl -L -o "/tmp/${LO_FILE}" "$LO_URL"
          hdiutil attach "/tmp/${LO_FILE}" -mountpoint /Volumes/LibreOffice -nobrowse -quiet
          cp -R "/Volumes/LibreOffice/LibreOffice.app" /Applications/
          hdiutil detach /Volumes/LibreOffice -quiet
          rm "/tmp/${LO_FILE}"
          echo "✅ LibreOffice 설치 완료"

      - name: PyInstaller 빌드 (LibreOffice 번들 포함)
        run: pyinstaller PPTMerger.spec

      - name: DMG 생성
        run: |
          hdiutil create -volname "PPT병합기" \
            -srcfolder "dist/PPT병합기.app" \
            -ov -format UDZO \
            "dist/PPT병합기_mac.dmg"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: PPT병합기-mac
          path: dist/PPT병합기_mac.dmg

  # ── Windows 빌드 ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install PySide6 python-pptx lxml pyinstaller

      - name: LibreOffice 최신 버전 확인
        id: lo_version
        shell: pwsh
        run: |
          $links = (Invoke-WebRequest 'https://download.documentfoundation.org/libreoffice/stable/' -UseBasicParsing).Links.href
          $ver = $links | Where-Object { $_ -match '^\d+\.\d+\.\d+/$' } | Sort-Object -Descending | Select-Object -First 1
          $ver = $ver.TrimEnd('/')
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "LibreOffice version: $ver"

      - name: LibreOffice MSI 캐시 복원
        id: lo_cache
        uses: actions/cache@v4
        with:
          path: deps\LibreOffice_Win_x86-64.msi
          key: libreoffice-win-x86_64-${{ steps.lo_version.outputs.version }}

      - name: LibreOffice MSI 다운로드
        if: steps.lo_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.lo_version.outputs.version }}"
          $url = "https://download.documentfoundation.org/libreoffice/stable/$ver/win/x86_64/LibreOffice_${ver}_Win_x86-64.msi"
          Write-Host "Downloading: $url"
          New-Item -ItemType Directory -Force -Path deps | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "deps\LibreOffice_Win_x86-64.msi" -UseBasicParsing
          Write-Host "LibreOffice MSI download complete"

      - name: Inno Setup 설치
        run: choco install innosetup -y --no-progress

      - name: PyInstaller 빌드
        run: pyinstaller PPTMerger.spec

      - name: Inno Setup 설치 파일 생성
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: PPT병합기-windows
          path: dist/PPT병합기_Setup_v1.0.exe

  # ── 릴리즈 생성 (태그 푸시 시) ──────────────────────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Mac 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: PPT병합기-mac
          path: artifacts

      - name: Windows 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: PPT병합기-windows
          path: artifacts

      - name: GitHub 릴리즈 생성
        uses: softprops/action-gh-release@v2
        with:
          name: "PPT 병합기 ${{ github.ref_name }}"
          body: |
            ## 🎉 PPT 병합기 ${{ github.ref_name }}

            여러 개의 PPT / PPTX 파일을 하나로 합쳐주는 데스크톱 프로그램입니다.

            ---

            ### ✨ 주요 기능

            - **PPT / PPTX 모두 지원** — 구버전 `.ppt` 파일도 자동 변환 후 병합
            - **드래그 앤 드롭** — 파일을 창에 끌어다 놓으면 바로 추가
            - **순서 자유롭게 변경** — 목록에서 드래그로 순서 조정
            - **개별 삭제** — 각 항목 우측 ✕ 버튼으로 삭제
            - **구분 슬라이드 자동 삽입** — 파일과 파일 사이에 검정 슬라이드 자동 추가
            - **저장 위치 직접 선택** — 병합 시 원하는 경로에 저장

            ---

            ### 📥 설치 방법

            | 운영체제 | 파일 | 방법 |
            |----------|------|------|
            | macOS | `PPT병합기_mac.dmg` | DMG 열고 앱 실행 |
            | Windows | `PPT병합기_Setup_v1.0.exe` | 설치 파일 실행 |

            > LibreOffice가 포함되어 있어 별도 설치 없이 `.ppt` 변환을 사용할 수 있습니다.
          files: |
            artifacts/PPT병합기_mac.dmg
            artifacts/PPT병합기_Setup_v1.0.exe
