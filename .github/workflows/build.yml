name: Build PPT 병합기

on:
  push:
    tags:
      - 'v*'          # v1.0, v1.1 등 태그 푸시 시 자동 빌드
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  # ── macOS 빌드 ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install PySide6 python-pptx lxml pyinstaller

      - name: PyInstaller 빌드
        run: pyinstaller PPTMerger.spec

      - name: DMG 생성
        run: |
          hdiutil create -volname "PPT병합기" \
            -srcfolder "dist/PPT병합기.app" \
            -ov -format UDZO \
            "dist/PPT병합기_mac.dmg"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: PPT병합기-mac
          path: dist/PPT병합기_mac.dmg

  # ── Windows 빌드 ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install PySide6 python-pptx lxml pyinstaller

      - name: PyInstaller 빌드
        run: pyinstaller PPTMerger.spec

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: PPT병합기-windows
          path: dist/PPT병합기.exe

  # ── 릴리즈 생성 (태그 푸시 시) ──────────────────────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Mac 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: PPT병합기-mac
          path: artifacts

      - name: Windows 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: PPT병합기-windows
          path: artifacts

      - name: GitHub 릴리즈 생성
        uses: softprops/action-gh-release@v2
        with:
          name: "PPT 병합기 ${{ github.ref_name }}"
          body: |
            ## 🎉 PPT 병합기 첫 번째 릴리즈

            여러 개의 PPT / PPTX 파일을 하나로 합쳐주는 데스크톱 프로그램입니다.

            ---

            ### ✨ 주요 기능

            - **PPT / PPTX 모두 지원** — 구버전 `.ppt` 파일도 자동 변환 후 병합
            - **드래그 앤 드롭** — 파일을 창에 끌어다 놓으면 바로 추가
            - **순서 자유롭게 변경** — 목록에서 드래그로 순서 조정
            - **개별 삭제** — 각 항목 우측 ✕ 버튼으로 삭제
            - **구분 슬라이드 자동 삽입** — 파일과 파일 사이에 검정 슬라이드 자동 추가
            - **저장 위치 직접 선택** — 병합 시 원하는 경로에 저장

            ---

            ### 📥 설치 방법

            | 운영체제 | 파일 | 방법 |
            |----------|------|------|
            | macOS | `PPT병합기_mac.dmg` | DMG 열고 앱 실행 |
            | Windows | `PPT병합기.exe` | EXE 파일 바로 실행 |

            > ⚠️ `.ppt` 파일 변환 기능을 사용하려면 [LibreOffice](https://www.libreoffice.org/) 설치가 필요합니다.
          files: |
            artifacts/PPT병합기_mac.dmg
            artifacts/PPT병합기.exe
